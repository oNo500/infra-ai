name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: oven-sh/setup-bun@v2
      - name: install
        run: pnpm install --frozen-lockfile
      - name: meta-cli tests + typecheck + lint
        working-directory: packages/meta-cli
        run: |
          bun test
          bunx tsc --noEmit
          bun run lint
      - name: iuse tests + typecheck + lint
        working-directory: packages/iuse
        run: |
          bun test
          bunx tsc --noEmit
          bun run lint
      - name: preview tests + typecheck + lint
        working-directory: packages/preview
        run: |
          bun test
          bunx tsc --noEmit
          bun run lint
      - name: asset reconcile gate
        run: pnpm meta status
